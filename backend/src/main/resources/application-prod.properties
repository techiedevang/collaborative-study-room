# =============================================================
# Spring Boot Production PostgreSQL Profile Configurations
# =============================================================

# Disable H2 web console in production for security compliance
spring.h2.console.enabled=false

# PostgreSQL Database Connection Parameters
# Reads environment variables injected by cloud hosting providers (Render, Heroku, Railway)
# Fallbacks are configured to point to local database settings
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}

# JPA / Hibernate Settings for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
